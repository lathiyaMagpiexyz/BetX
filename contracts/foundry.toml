[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
bsc_testnet = "https://data-seed-prebsc-1-s1.bnbchain.org:8545"
bsc = "https://bsc-dataseed.bnbchain.org"
base_sepolia = "${ALCHEMY_API_KEY:+https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}}"
base = "${ALCHEMY_API_KEY:+https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}}"

[etherscan]
bsc_testnet = { key = "${BSCSCAN_API_KEY}", chain = 97 }
bsc = { key = "${BSCSCAN_API_KEY}", chain = 56 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
